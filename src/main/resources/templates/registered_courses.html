<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registered Courses</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #f0f8ff 0%, #e6f7ff 100%); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 20px; text-align: center; font-weight: 600; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; border: none; border-radius: 50px; text-decoration: none; font-weight: 500; transition: all 0.3s ease; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); }
        .btn-back { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e9ecef; }
        th { background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%); color: white; text-transform: uppercase; font-weight: 600; }
        tr:hover { background: #f8f9fa; }
        .action-cell { text-align: center; }
        .unregister-btn { padding: 6px 12px; background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: white; border: none; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.3s ease; }
        .unregister-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4); }
        .empty-state { text-align: center; padding: 40px; color: #7f8c8d; }
        .empty-state i { font-size: 3rem; color: #bdc3c7; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-list-check"></i> Your Registered Courses</h1>
        <a href="/student/dashboard" class="btn btn-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>

    <div th:if="${registeredCourses != null and !registeredCourses.isEmpty()}">
        <table>
            <thead>
            <tr>
                <th>Course Code</th>
                <th>Title</th>
                <th>Description</th>
                <th>Seats</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${registeredCourses}">
                <td th:text="${course.courseCode}">CS101</td>
                <td th:text="${course.title}">Intro to CS</td>
                <td th:text="${course.description}">Course Description</td>
                <td th:text="${course.seats}">10</td>
                <td class="action-cell">
                    <a th:href="@{/student/unregister-course(courseId=${course.id})}" class="unregister-btn">
                        <i class="fas fa-times"></i> Unregister
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${registeredCourses == null or registeredCourses.isEmpty()}" class="empty-state">
        <i class="fas fa-inbox"></i>
        <h2>No Registered Courses</h2>
        <p>You haven't registered for any courses yet.</p>
        <a href="/student/dashboard" class="btn" style="margin-top: 15px;">
            <i class="fas fa-book"></i> Browse Courses
        </a>
    </div>
</div>
</body>
</html>
