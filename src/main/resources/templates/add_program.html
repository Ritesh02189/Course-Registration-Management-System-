<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Add Program</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: center; }
    .form-container { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h2 { color: #2c3e50; margin-bottom: 25px; text-align: center; font-weight: 600; }
    .form-group { margin-bottom: 20px; }
    label { font-weight: 600; color: #2c3e50; display: block; margin-bottom: 8px; }
    input { width: 100%; padding: 12px 15px; border: 2px solid #e1e5ee; border-radius: 8px; font-size: 1rem; transition: all 0.3s ease; outline: none; }
    input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
    button { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 500; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(118, 75, 162, 0.4); }
    .back-link { display: block; text-align: center; margin-top: 20px; color: #667eea; text-decoration: none; font-weight: 500; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="form-container">
  <h2><i class="fas fa-plus-circle"></i> Add New Program</h2>
  <form th:action="@{/admin/program/save}" th:object="${program}" method="post">
    <div class="form-group">
      <!-- Use programName instead of name -->
      <label for="programName">Program Name:</label>
      <input type="text" id="programName" th:field="*{programName}" placeholder="e.g., Computer Science" required>
    </div>

    <div class="form-group">
      <label for="title">Program Title (Optional):</label>
      <input type="text" id="title" th:field="*{title}" placeholder="e.g., Bachelor of Computer Science">
    </div>

    <button type="submit"><i class="fas fa-save"></i> Add Program</button>
  </form>
  <a href="/admin/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
</div>
</body>
</html>
