<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Error</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
    .error-icon { font-size: 4rem; color: #dc3545; margin-bottom: 20px; }
    h1 { color: #dc3545; margin-bottom: 15px; }
    p { color: #721c24; margin-bottom: 25px; font-size: 1.1rem; }
    a { display: inline-block; padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 50px; text-decoration: none; font-weight: 500; transition: all 0.3s ease; }
    a:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4); }
  </style>
</head>
<body>
<div class="container">
  <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
  <h1>⚠ Error Occurred</h1>
  <p th:text="${errorMessage}">Something went wrong!</p>
  <a href="/admin/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
</div>
</body>
</html>
